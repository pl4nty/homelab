apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: obsidian
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  image: docker.io/library/node:24.18.0-bookworm
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - /bin/sh
            - -lc
          args:
            - npx -y @bitbonsai/mcpvault /vault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vault
              mountPath: /vault
        - name: sync
          image: docker.io/library/node:24.18.0-bookworm
          command:
            - /bin/sh
            - -lc
          args:
            - npx -y obsidian-headless sync-setup --path /vault --vault heap --password "$VAULT_PASSWORD" && exec npx -y obsidian-headless sync --path /vault --continuous
          env:
            - name: OBSIDIAN_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: toolhive
                  key: obsidian-auth-token
            - name: VAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: toolhive
                  key: obsidian-vault-password
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vault
              mountPath: /vault
      volumes:
        - name: tmp
          emptyDir: {}
        - name: vault
          emptyDir: {}
  env:
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp/.npm
