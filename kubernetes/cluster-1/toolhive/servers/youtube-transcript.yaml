apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: youtube-transcript
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  image: ghcr.io/astral-sh/uv:python3.12-bookworm
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - uvx
          args:
            - git+https://github.com/jkawamoto/mcp-youtube-transcript
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: UV_CACHE_DIR
              value: /tmp/.cache/uv
      volumes:
        - name: tmp
          emptyDir: {}
