apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: aliexpress-scraper
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  image: docker.io/library/node:24.18.0-bookworm
  telemetryConfigRef:
    name: toolhive
  podTemplateSpec:
    spec:
      resources:
        requests:
          memory: 512Mi
      containers:
        - name: mcp
          command:
            - /bin/sh
            - -lc
          args:
            - npx -y github:pl4nty/aliexpress-product-scraper#copilot/implement-mcp-server-search-tool
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  env:
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp/.npm
    - name: PUPPETEER_SKIP_DOWNLOAD
      value: "true"
  secrets:
    - name: toolhive
      key: browser-ws-endpoint
      targetEnvName: BROWSER_WS_ENDPOINT
