apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: daytona
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  image: docker.io/library/node:24.17.0-bookworm@sha256:733e1c06ada118ed9f6133a31aa1290be6929664026fb28821500437c61f2c6f
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              arch="$(uname -m)"
              case "$arch" in
                x86_64) arch=amd64 ;;
                aarch64) arch=arm64 ;;
              esac
              curl -fsSL "https://github.com/daytona/clients/releases/download/$DAYTONA_VERSION/daytona-linux-$arch" -o /tmp/daytona
              chmod +x /tmp/daytona
              exec /tmp/daytona mcp start
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: HOME
              value: /tmp
            # renovate: datasource=github-releases depName=daytona/clients
            - name: DAYTONA_VERSION
              value: "v0.199.0"
      volumes:
        - name: tmp
          emptyDir: {}
  env:
    - name: DAYTONA_API_URL
      value: https://app.daytona.io/api
  secrets:
    - name: toolhive
      key: daytona-api-key
      targetEnvName: DAYTONA_API_KEY
