apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: google-maps
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  image: docker.io/library/node:24.17.0-bookworm@sha256:733e1c06ada118ed9f6133a31aa1290be6929664026fb28821500437c61f2c6f
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - /bin/sh
            - -lc
          args:
            - npx -y @cablate/mcp-google-map --stdio
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  env:
    - name: HOME
      value: /tmp
    - name: NPM_CONFIG_CACHE
      value: /tmp/.npm
  secrets:
    - name: toolhive
      key: google-maps-api-key
      targetEnvName: GOOGLE_MAPS_API_KEY
