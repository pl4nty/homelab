apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: selfhost
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  externalAuthConfigRef:
    name: entra-upstream
  image: ghcr.io/astral-sh/uv:python3.12-bookworm
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - uvx
          args:
            - git+https://github.com/pl4nty/mcp#copilot/add-tools-for-flowsavvy-tasks
            - mcp-server
          env:
            - name: HOME
              value: /dev/shm
            - name: XDG_CACHE_HOME
              value: /dev/shm/.cache
            - name: UV_CACHE_DIR
              value: /dev/shm/.cache/uv
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: toolhive
                  key: entra-client-id
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: toolhive
                  key: entra-client-secret
  secrets:
    - name: toolhive
      key: flowsavvy-cookie
      targetEnvName: FLOWSAVVY_COOKIE
