apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: selfhost
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  externalAuthConfigRef:
    name: entra-upstream
  image: ghcr.io/astral-sh/uv:python3.12-bookworm
  transport: streamable-http
  mcpPort: 8000
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - uvx
          args:
            - --from
            - git+https://github.com/pl4nty/mcp@claude/funny-tesla-0qe9X
            - mcp-server
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: UV_CACHE_DIR
              value: /tmp/.cache/uv
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: toolhive
                  key: entra-client-id
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: toolhive
                  key: entra-client-secret
      volumes:
        - name: tmp
          emptyDir: {}
  secrets:
    - name: toolhive
      key: flowsavvy-cookie
      targetEnvName: FLOWSAVVY_COOKIE
