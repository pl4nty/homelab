apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: toolhive
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  authServerConfig:
    issuer: https://mcp.${PUBLIC_DOMAIN}
    upstreamProviders:
      - name: entra
        type: oidc
        oidcConfig:
          # OIDC common issuerUrl returns {tenantid} issuer, which toolhive rejects
          issuerUrl: https://login.microsoftonline.com/9188040d-6c67-4c5b-b112-36a304b66dad/v2.0
          clientId: 5c3c299e-f61f-41cc-b4e1-f12018b84afa
          clientSecretRef:
            name: toolhive
            key: entra-client-secret
          scopes:
            - openid
            - profile
            - email
            - offline_access
            - https://graph.microsoft.com/User.Read
            - https://graph.microsoft.com/Calendars.ReadWrite
            - https://graph.microsoft.com/Mail.ReadWrite
            - https://graph.microsoft.com/MailboxSettings.Read
            - https://graph.microsoft.com/Contacts.ReadWrite
            - https://graph.microsoft.com/Files.ReadWrite
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: toolhive
      audience: https://mcp.${PUBLIC_DOMAIN}/
      resourceUrl: https://mcp.${PUBLIC_DOMAIN}/
  outgoingAuth:
    source: discovered
  config:
    operational:
      logLevel: debug
    codeMode:
      enabled: true
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: toolhive-safe
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  authServerConfig:
    issuer: https://mcp-safe.${PUBLIC_DOMAIN}
    upstreamProviders:
      - name: entra
        type: oidc
        oidcConfig:
          # OIDC common issuerUrl returns {tenantid} issuer, which toolhive rejects
          issuerUrl: https://login.microsoftonline.com/9188040d-6c67-4c5b-b112-36a304b66dad/v2.0
          clientId: 5c3c299e-f61f-41cc-b4e1-f12018b84afa
          clientSecretRef:
            name: toolhive
            key: entra-client-secret
          scopes:
            - openid
            - profile
            - email
            - offline_access
            - https://graph.microsoft.com/User.Read
            - https://graph.microsoft.com/Calendars.ReadWrite
            - https://graph.microsoft.com/Mail.ReadWrite
            - https://graph.microsoft.com/MailboxSettings.Read
            - https://graph.microsoft.com/Contacts.ReadWrite
            - https://graph.microsoft.com/Files.ReadWrite
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: toolhive-safe
      audience: https://mcp-safe.${PUBLIC_DOMAIN}/
      resourceUrl: https://mcp-safe.${PUBLIC_DOMAIN}/
  outgoingAuth:
    source: discovered
  config:
    operational:
      logLevel: debug
    aggregation:
      tools:
        - workload: calendar
          filter:
            - get_event_attachments
            - get_event_details
            - list_calendars
            - list_events
            - list_events_today
            - search_events
        - workload: contact
          filter:
            - list_contacts
            - get_contact
        - workload: onedrive
          filter:
            - get_drive
            - get_drive_item
            - list_all_drives
            - list_drive_items
            - list_permissions
            - list_shared_with_me_items
        - workload: outlook
          filter:
            - get_email_details
            - get_my_email_address
            - list_attachments
            - list_emails
            - list_group_thread_email_attachments
            - list_group_thread_posts
            - list_group_threads
            - list_groups
            - list_mail_folders
            - read_attachment
            - search_emails
        - workload: selfhost
        - workload: google-maps
        - workload: youtube-transcript
