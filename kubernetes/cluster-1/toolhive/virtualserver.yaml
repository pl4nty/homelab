apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: toolhive
  namespace: toolhive-system
spec:
  groupRef:
    name: toolhive
  telemetryConfigRef:
    name: toolhive
  authServerConfig:
    issuer: https://mcp.${PUBLIC_DOMAIN}
    upstreamProviders:
      - name: entra
        type: oidc
        oidcConfig:
          # OIDC common issuerUrl returns {tenantid} issuer, which toolhive rejects
          issuerUrl: https://login.microsoftonline.com/9188040d-6c67-4c5b-b112-36a304b66dad/v2.0
          clientId: 5c3c299e-f61f-41cc-b4e1-f12018b84afa
          clientSecretRef:
            name: toolhive
            key: entra-client-secret
          scopes:
            - openid
            - profile
            - email
            - offline_access
            - https://graph.microsoft.com/User.Read
            - https://graph.microsoft.com/Calendars.Read
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: toolhive
      audience: https://mcp.${PUBLIC_DOMAIN}
      resourceUrl: https://mcp.${PUBLIC_DOMAIN}
  outgoingAuth:
    source: discovered
