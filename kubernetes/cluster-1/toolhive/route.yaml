apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: toolhive
  namespace: toolhive-system
spec:
  parentRefs:
    - name: ${CLUSTER_NAME}
      namespace: default
  hostnames:
    - mcp.${PUBLIC_DOMAIN}
  rules:
    - backendRefs:
        - name: vmcp-toolhive
          port: 4483
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: toolhive-safe
  namespace: toolhive-system
spec:
  parentRefs:
    - name: ${CLUSTER_NAME}
      namespace: default
  hostnames:
    - mcp-safe.${PUBLIC_DOMAIN}
  rules:
    - backendRefs:
        - name: vmcp-toolhive-safe
          port: 4483