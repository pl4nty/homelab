apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: toolhive
  namespace: toolhive-system
spec:
  parentRefs:
    - name: ${CLUSTER_NAME}
      namespace: default
  hostnames:
    - toolhive.${PUBLIC_DOMAIN}
  rules:
    - backendRefs:
        - name: vmcp-toolhive
          port: 8080
